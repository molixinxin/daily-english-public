<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Advanced English Daily</title>
  <meta http-equiv="refresh" content="0; url=./2026-06-24.html">
  <style>
    :root {
      --bg: #f6f2ea;
      --panel: rgba(255, 255, 255, 0.92);
      --ink: #1f2933;
      --muted: #5f6c7b;
      --accent: #8c3d1e;
      --line: #d8d1c4;
      --zh: "Microsoft YaHei", Arial, sans-serif;
      --en: Georgia, "Times New Roman", serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(140, 61, 30, 0.12), transparent 25%),
        linear-gradient(180deg, #fcfaf6 0%, var(--bg) 100%);
      font-family: var(--zh);
    }
    main {
      width: min(680px, 100%);
      padding: 32px 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      text-align: center;
      box-shadow: 0 18px 46px rgba(31, 41, 51, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-family: var(--en);
      font-size: clamp(30px, 5vw, 52px);
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 16px;
    }
    a {
      color: #fff;
      background: var(--accent);
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 999px;
      display: inline-block;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Advanced English Daily</h1>
    <p>正在跳转到今天的公开学习页。如果没有自动跳转，请手动打开下面的链接。</p>

  </main>
</body>
</html>
